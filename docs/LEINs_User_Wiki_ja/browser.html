<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>ブラウザ</h1><p class="guide-lead">LINEでリンクを開くときの動きを選べます。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>いつものブラウザで開く</h3><p>リンクを普段使っているブラウザへ渡せます。</p></article><article><h3>別画面で開く</h3><p>LINEの中ではなく、ブラウザの画面として開けます。</p></article><article><h3>暗い色で表示する</h3><p>対応するページを暗い見た目にできます。</p></article><article><h3>LEINsボタンを隠す</h3><p>LINE内に設定ボタンを出したくない場合に使います。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
