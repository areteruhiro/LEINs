<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>ボタン設定</h1><p class="guide-lead">画面上のボタンや文字を、自分が使いやすい形に整えます。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>通話ボタンを隠す</h3><p>音声通話やビデオ通話を使わない場合に隠せます。</p></article><article><h3>文字の見た目を変える</h3><p>好みの文字に変更できます。</p></article><article><h3>LEINsボタンを動かす</h3><p>押しやすい位置へ移動できます。</p></article><article><h3>余白を調整する</h3><p>ほかのボタンと重ならないように整えられます。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
