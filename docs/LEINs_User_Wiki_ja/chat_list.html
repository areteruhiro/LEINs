<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>チャットリスト</h1><p class="guide-lead">トーク一覧の上部を、必要なものだけに整えます。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>検索欄を隠す</h3><p>検索をあまり使わない場合に、一覧を広く見せられます。</p></article><article><h3>近道ボタンを減らす</h3><p>アルバム、オープンチャット、AIなどのボタンを隠せます。</p></article><article><h3>新しいトークのボタンを隠す</h3><p>誤って押しやすい作成ボタンを減らせます。</p></article><article><h3>「もっと」を隠す</h3><p>使わないメニューを減らせます。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
