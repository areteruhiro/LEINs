<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>バックアップ・復元</h1><p class="guide-lead">大切なトークを保存し、必要なときに戻します。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>トークを保存する</h3><p>機種変更や不具合に備えて、トークの控えを残せます。</p></article><article><h3>保存した内容を戻す</h3><p>以前に保存したトークを選んで戻せます。</p></article><article><h3>上書きを防ぐ</h3><p>大切な控えが別の保存で消えないように守ります。</p></article><article><h3>写真も忘れずに</h3><p>トーク内の写真は別に保存が必要な場合があります。</p></article></div></section><aside class="friendly-note">復元の前には、戻す日付と保存先をよく確認してください。</aside></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
