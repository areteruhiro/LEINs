<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>チャット</h1><p class="guide-lead">メッセージの送信、保存、返信、表示を使いやすくします。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>送信取消に備える</h3><p>取り消されたメッセージを確認しやすくします。</p></article><article><h3>自動で返信する</h3><p>あらかじめ決めた内容を自動で返せます。</p></article><article><h3>送る時間を決める</h3><p>メッセージをあとで送るようにできます。</p></article><article><h3>写真や動画を保存する</h3><p>名前や保存条件を選びやすくします。</p></article><article><h3>検索しやすくする</h3><p>短い言葉でもトーク内を探しやすくします。</p></article><article><h3>不要な案内を隠す</h3><p>AIの提案など、使わない表示を減らせます。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
