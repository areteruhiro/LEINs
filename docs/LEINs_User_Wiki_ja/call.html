<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>着信音・発信音</h1><p class="guide-lead">LINE通話の画面、音量、着信音を使いやすく調整します。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>通話中にLINEを開く</h3><p>通話画面からトークへ戻りやすくします。</p></article><article><h3>通話の音量を調整する</h3><p>声の聞こえ方やマイクの大きさを調整できます。</p></article><article><h3>静かなときは鳴らさない</h3><p>スマホが消音中なら着信音を鳴らさないようにできます。</p></article><article><h3>着信音を選ぶ</h3><p>スマホに入っている音から選べます。</p></article><article><h3>着信音を止める</h3><p>画面に停止ボタンを追加できます。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
