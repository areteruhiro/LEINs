<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>通知</h1><p class="guide-lead">届く通知を減らしたり、通知からすぐ操作したりできます。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>相手やグループを選んで静かにする</h3><p>通知を受け取りたくない相手を選べます。</p></article><article><h3>写真を見やすくする</h3><p>通知に写真を表示して内容を分かりやすくします。</p></article><article><h3>通知からコピーする</h3><p>メッセージをすぐコピーできるボタンを追加します。</p></article><article><h3>通知から既読にする</h3><p>LINEを開かずに既読にできるボタンを追加します。</p></article><article><h3>リアクションを知らせる</h3><p>メッセージへの反応を通知で確認できます。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
