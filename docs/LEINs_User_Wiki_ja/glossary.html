<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>よく使う言葉</h1><p class="guide-lead">設定画面でよく見る言葉を、短く説明します。</p><section><h2>覚えておくと便利</h2><div class="guide-grid"><article><h3>カテゴリ</h3><p>似た設定をまとめたグループです。</p></article><article><h3>スイッチ</h3><p>設定をオン・オフするためのボタンです。</p></article><article><h3>検索</h3><p>設定名の一部を入力して探す機能です。</p></article><article><h3>再起動</h3><p>LINEをいったん閉じて、もう一度開くことです。</p></article><article><h3>バックアップ</h3><p>トークなどの大切な内容を、あとで戻せるように保存することです。</p></article><article><h3>復元</h3><p>保存しておいた内容を戻すことです。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
