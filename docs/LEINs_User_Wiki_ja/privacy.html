<body><header class="wiki-header"><nav class="wiki-nav" aria-label="ガイド"><a class="wiki-brand" href="../index.html"><img src="../assets/leins-icon.png" alt="" width="34" height="34"><span>LEINs Guide</span></a><div class="wiki-links"><a href="getting-started.html">はじめ方</a><a href="settings-ui.html">設定画面</a><a href="editions.html">表示について</a><a href="glossary.html">よく使う言葉</a></div></nav></header><main class="wiki-main"><article class="wiki-article"><p class="back-link"><a href="../index.html">ホームへ戻る</a></p><h1>プライバシー・既読</h1><p class="guide-lead">既読の付き方や、あとで読み返すための動きを調整します。</p><section><h2>できること</h2><div class="guide-grid"><article><h3>既読を付けずに読む</h3><p>メッセージを開いても、すぐに既読を付けないようにできます。</p></article><article><h3>相手ごとに選ぶ</h3><p>既読を付ける相手を選べます。</p></article><article><h3>あとで既読にする</h3><p>好きなタイミングで既読にするボタンを追加できます。</p></article><article><h3>すぐ切り替える</h3><p>トーク一覧から既読の設定を切り替えられます。</p></article><article><h3>読まれたか確認する</h3><p>自分が送ったメッセージの確認に役立つ表示を追加できます。</p></article></div></section></article></main><footer class="wiki-footer">LEINs 使い方ガイド</footer></body></html>
